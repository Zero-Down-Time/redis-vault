[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
]
all-features = true

[advisories]
ignore = [
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki: via aws-sdk; not exploitable without CA misissuance" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki: same path; URI/wildcard name constraints unused" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki: no CRL parsing in our code path" },
]

[bans]
multiple-versions = "allow" #"warn"
wildcards = 'deny'
deny = [
]
skip = [
]
skip-tree = [
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
# We want really high confidence when inferring licenses from text
confidence-threshold = 0.93
allow = [
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
exceptions = [
]
